services:
  cors-proxy:
    image: node:20-alpine
    container_name: cors-proxy
    restart: unless-stopped
    command: ["node", "/app/server.js"]
    expose:
      - ${PORT:-8080}
    env_file:
      - .env
    volumes:
      - ./server.js:/app/server.js:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cors-proxy.rule=Host(`${CORS_PROXY_HOSTNAME?}`)"
      - "traefik.http.routers.cors-proxy.entrypoints=websecure"
      - "traefik.http.routers.cors-proxy.tls.certresolver=letsencrypt"
      - "traefik.http.services.cors-proxy.loadbalancer.server.port=${PORT:-8080}"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || '8080') + '/healthz').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 1m
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - cors-proxy
      - all
